name: Test React Sample App

on:
  pull_request:
    paths:
      - react-js-sample-app/**
  push:
    paths:
      - react-js-sample-app/**
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: ⎔ Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0

      - name: 📥 Download deps
        run: |
          cd react-js-sample-app
          npm i

      - name: Run Lint
        run: |
          cd react-js-sample-app
          npm run lint
