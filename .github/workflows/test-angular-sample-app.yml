name: Test Angular Sample App

on:
  pull_request:
    paths:
      - angular-sample-app/**
  push:
    paths:
      - angular-sample-app/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: ⎔ Setup node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: 📥 Download deps
        run: |
          cd angular-sample-app
          npm i

      - name: Run build
        run: |
          cd angular-sample-app
          npm run build
