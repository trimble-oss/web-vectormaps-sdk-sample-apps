version: 2
updates:
  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: "/"
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 1

  - package-ecosystem: npm
    cooldown:
      default-days: 7
    directory: "/angular-sample-app/"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "patch"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    versioning-strategy: increase
    ignore:
      - dependency-name: eslint
      - dependency-name: typescript

  - package-ecosystem: npm
    cooldown:
      default-days: 7
    directory: "/js-sample-app/"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    versioning-strategy: increase
    ignore:
      - dependency-name: eslint

  - package-ecosystem: npm
    cooldown:
      default-days: 7
    directory: "/react-js-sample-app/"
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    versioning-strategy: increase
    ignore:
      - dependency-name: eslint
